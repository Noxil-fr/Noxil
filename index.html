<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noxil</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
    }

    :root.light {
      --bg:      #d8dde5;
      --surface: #e6e9ef;
      --border:  #b4bcc8;
      --text:    #1a1e24;
      --muted:   #505a68;
      --accent:  #0860c8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      transition: background 0.25s, color 0.25s;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 36px;
      font-weight: 700;
      font-family: 'Century Gothic', 'AppleGothic', 'Trebuchet MS', sans-serif;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .theme-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .theme-btn:hover { color: var(--text); }

    /* ── LOCK SCREEN ── */
    .lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
      gap: 0;
    }

    .lock-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── MAIN ── */
    main { padding: 32px 0; display: flex; flex-direction: column; gap: 36px; }

    .with-divider {
      position: relative;
      padding-top: 36px;
    }

    .with-divider::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border) 20%, var(--border) 80%, transparent);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* ── TILE ── */
    .tile {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .tile:hover {
      border-color: var(--tile-color, var(--accent));
      box-shadow: 0 0 0 1px var(--tile-color, var(--accent));
    }

    .tile-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--tile-color, var(--muted));
      flex-shrink: 0;
    }

    .tile-name { font-size: 20px; font-weight: 600; }
    .tile-url  { font-size: 13px; color: var(--muted); }

    /* ── CONTACTS ── */
    .contact-list {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 10px;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
    }

    .contact-name  { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .contact-phone { font-size: 14px; font-weight: 500; letter-spacing: 0.02em; }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── CODE INPUTS ── */
    .code-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .digit {
      width: 36px;
      height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .code-error {
      font-size: 13px;
      color: #f85149;
      min-height: 20px;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer { display: none; }

    .hidden { display: none !important; }

    /* ── NOTES ── */
    .note-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 0;
    }

    .new-note-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: color-mix(in srgb, var(--accent) 12%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
      border-radius: 6px;
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .new-note-btn:hover { border-color: var(--muted); }

    .notes-wrapper {
      display: grid;
      grid-template-columns: 50% 1fr;
      grid-template-rows: auto auto;
      column-gap: 24px;
      row-gap: 14px;
      align-items: start;
    }

    .note-header  { grid-column: 1; grid-row: 1; }
    .notes-list   { display: flex; flex-direction: column; grid-column: 1; grid-row: 2; }
    .note-preview { grid-column: 2; grid-row: 2; }

    .notes-list.has-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .note-preview {
      opacity: 0;
      transition: opacity 0.18s;
      pointer-events: none;
      padding-top: 2px;
    }

    .note-preview.visible { opacity: 1; }

    .note-preview-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .note-preview-body  { font-size: 13px; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
    .note-empty         { font-size: 14px; color: var(--muted); }

    .note-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    .note-item:last-child { border-bottom: none; }
    .note-item:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .note-item-title { font-size: 14px; font-weight: 500; flex: 1; }

    .note-delete-btn {
      background: none;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.12s;
    }

    .note-item:hover .note-delete-btn { color: var(--muted); }
    .note-delete-btn:hover { color: #f85149 !important; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal input {
      padding: 22px 24px 6px;
      font-size: 20px;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      outline: none;
      width: 100%;
    }

    .modal textarea {
      padding: 6px 24px 20px;
      font-size: 14px;
      line-height: 1.7;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 200px;
      width: 100%;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .btn-cancel:hover { color: var(--text); }

    .btn-save {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.82; }

    .btn-danger {
      background: #c0392b;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-danger:hover { opacity: 0.82; }

    .confirm-modal {
      max-width: 300px;
      padding: 22px 22px 14px;
      gap: 18px;
    }

    .confirm-message { font-size: 14px; color: var(--text); line-height: 1.5; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <span class="logo">Noxil.</span>
      <button class="theme-btn" id="theme-toggle">Clair</button>
    </header>

    <!-- Écran de verrouillage -->
    <div class="lock-screen" id="lock-screen">
      <p class="lock-label">Code d'accès</p>
      <div class="code-inputs">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
        <input class="digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
      </div>
      <p class="code-error" id="code-error"></p>
    </div>

    <!-- Contenu principal (masqué jusqu'au déverrouillage) -->
    <main class="hidden" id="main">

      <section>
        <div class="contact-list" id="contact-list"></div>
      </section>

      <section class="with-divider">
        <div class="grid" id="grid"></div>
      </section>

      <section class="with-divider">
        <div class="notes-wrapper">
          <div class="note-header">
            <button class="new-note-btn" id="new-note-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Nouvelle note
            </button>
          </div>
          <div class="notes-list" id="notes-list">
            <p class="note-empty" id="notes-empty">Aucune note pour l'instant.</p>
          </div>
          <div class="note-preview" id="note-preview">
            <div class="note-preview-title" id="preview-title"></div>
            <div class="note-preview-body" id="preview-body"></div>
          </div>
        </div>
      </section>

    </main>

    <footer><span id="year"></span> — Noxil</footer>
  </div>

  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal confirm-modal">
      <p class="confirm-message">Supprimer cette note ?</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="confirm-cancel">Annuler</button>
        <button class="btn-danger" id="confirm-ok">Supprimer</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="note-modal">
    <div class="modal">
      <input type="text" id="note-title" placeholder="Titre" maxlength="80">
      <textarea id="note-content" placeholder="Contenu de la note…"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Annuler</button>
        <button class="btn-save" id="modal-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    /* ── THEME ── */
    const themeBtn = document.getElementById('theme-toggle');
    function applyTheme(t) {
      document.documentElement.classList.toggle('light', t === 'light');
      themeBtn.textContent = t === 'light' ? 'Sombre' : 'Clair';
    }
    themeBtn.addEventListener('click', () => {
      const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
      localStorage.setItem('noxil-theme', next);
      applyTheme(next);
    });
    applyTheme(localStorage.getItem('noxil-theme') || 'dark');

    /* ── SHA-256 ── */
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    /* ── CODE GATE ── */
    const lockScreen = document.getElementById('lock-screen');
    const mainEl     = document.getElementById('main');
    const digits     = document.querySelectorAll('.digit');
    const codeError  = document.getElementById('code-error');

    digits.forEach((d, i) => {
      d.addEventListener('input', () => {
        d.value = d.value.replace(/\D/g, '').slice(-1);
        if (d.value && i < digits.length - 1) digits[i + 1].focus();
        if ([...digits].every(x => x.value)) verifyCode();
      });
      d.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !d.value && i > 0) digits[i - 1].focus();
      });
    });

    digits[0].focus();

    let sb = null;

    async function verifyCode() {
      const entered = [...digits].map(d => d.value).join('');
      const hash    = await sha256(entered);

      if (hash !== NOXIL.h) {
        codeError.textContent = 'Code incorrect.';
        digits.forEach(d => d.value = '');
        digits[0].focus();
        return;
      }

      codeError.textContent = 'Connexion…';
      sb = window.supabase.createClient(NOXIL.url, NOXIL.key);

      try {
        const [{ data: projects, error: e1 }, { data: contacts, error: e2 }, { data: notes, error: e3 }] = await Promise.all([
          sb.from('projects').select('*').order('ord'),
          sb.from('contacts').select('*').order('ord'),
          sb.from('notes').select('*').order('created_at', { ascending: false })
        ]);

        if (e1 || e2 || e3) throw new Error();

        renderGrid(projects || []);
        renderContacts(contacts || []);
        await migrateLocalNotes(notes || []);

        lockScreen.classList.add('hidden');
        mainEl.classList.remove('hidden');
      } catch {
        codeError.textContent = 'Erreur de connexion.';
        digits.forEach(d => d.value = '');
        digits[0].focus();
      }
    }

    /* ── MIGRATION LOCALSTORAGE → SUPABASE ── */
    async function migrateLocalNotes(remoteNotes) {
      const local = JSON.parse(localStorage.getItem('noxil-notes') || '[]');
      if (local.length > 0) {
        await Promise.all(local.map(n =>
          sb.from('notes').insert({
            title:      n.title   || '',
            content:    n.content || '',
            created_at: n.createdAt || new Date().toISOString()
          })
        ));
        localStorage.removeItem('noxil-notes');
        const { data: fresh } = await sb.from('notes').select('*').order('created_at', { ascending: false });
        renderNotes(fresh || []);
      } else {
        renderNotes(remoteNotes);
      }
    }

    /* ── RENDER ── */
    function escapeHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderGrid(projects) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      projects.forEach(p => {
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = p.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.style.setProperty('--tile-color', p.color);
        a.innerHTML = `
          <div>
            <div class="tile-name">${escapeHtml(p.name)}</div>
            <div class="tile-url">${escapeHtml(p.url.replace('https://', ''))}</div>
          </div>
          <span class="tile-dot"></span>
        `;
        grid.appendChild(a);
      });
    }

    function renderContacts(contacts) {
      const list = document.getElementById('contact-list');
      list.innerHTML = '';
      contacts.forEach(c => {
        const card = document.createElement('div');
        card.className = 'contact-card';
        card.innerHTML = `
          <div>
            <div class="contact-name">${escapeHtml(c.name)}</div>
            <div class="contact-phone">${escapeHtml(c.phone)}</div>
          </div>
          <button class="copy-btn" data-v="${escapeHtml(c.phone)}">Copier</button>
        `;
        card.querySelector('.copy-btn').addEventListener('click', function () {
          navigator.clipboard.writeText(this.dataset.v);
          this.textContent = 'Copié ✓';
          setTimeout(() => this.textContent = 'Copier', 2000);
        });
        list.appendChild(card);
      });
    }

    function renderNotes(notes) {
      const list  = document.getElementById('notes-list');
      const empty = document.getElementById('notes-empty');
      list.querySelectorAll('.note-item').forEach(el => el.remove());
      if (notes.length === 0) {
        empty.classList.remove('hidden');
        list.classList.remove('has-notes');
        return;
      }
      empty.classList.add('hidden');
      list.classList.add('has-notes');
      notes.forEach(note => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.innerHTML = `
          <span class="note-item-title">${escapeHtml(note.title || 'Sans titre')}</span>
          <button class="note-delete-btn" data-id="${note.id}" title="Supprimer">✕</button>
        `;
        item.addEventListener('mouseenter', () => {
          document.getElementById('preview-title').textContent = note.title || 'Sans titre';
          document.getElementById('preview-body').textContent  = note.content || '';
          document.getElementById('note-preview').classList.add('visible');
        });
        item.addEventListener('mouseleave', () => {
          document.getElementById('note-preview').classList.remove('visible');
        });
        item.addEventListener('click', () => openNoteModal(note));
        item.querySelector('.note-delete-btn').addEventListener('click', async function (e) {
          e.stopPropagation();
          const id = this.dataset.id;
          showConfirm(async () => {
            await sb.from('notes').delete().eq('id', id);
            const { data } = await sb.from('notes').select('*').order('created_at', { ascending: false });
            renderNotes(data || []);
          });
        });
        list.appendChild(item);
      });
    }

    /* ── CONFIRM MODAL ── */
    const confirmModal = document.getElementById('confirm-modal');

    function showConfirm(onConfirm) {
      confirmModal.classList.remove('hidden');
      const ok     = document.getElementById('confirm-ok');
      const cancel = document.getElementById('confirm-cancel');
      function cleanup() {
        confirmModal.classList.add('hidden');
        ok.removeEventListener('click', handleOk);
        cancel.removeEventListener('click', handleCancel);
      }
      function handleOk()     { cleanup(); onConfirm(); }
      function handleCancel() { cleanup(); }
      ok.addEventListener('click', handleOk);
      cancel.addEventListener('click', handleCancel);
    }

    /* ── NOTE MODAL ── */
    const noteModal      = document.getElementById('note-modal');
    const newNoteBtn     = document.getElementById('new-note-btn');
    const modalCancel    = document.getElementById('modal-cancel');
    const modalSave      = document.getElementById('modal-save');
    const noteTitleInput = document.getElementById('note-title');
    const noteBodyInput  = document.getElementById('note-content');
    let currentEditId    = null;

    function openModal() {
      currentEditId = null;
      noteTitleInput.value = '';
      noteBodyInput.value  = '';
      noteModal.classList.remove('hidden');
      noteTitleInput.focus();
    }

    function openNoteModal(note) {
      currentEditId        = note.id;
      noteTitleInput.value = note.title;
      noteBodyInput.value  = note.content;
      noteModal.classList.remove('hidden');
      noteTitleInput.focus();
    }

    function closeModal() { noteModal.classList.add('hidden'); }

    newNoteBtn.addEventListener('click', openModal);
    modalCancel.addEventListener('click', closeModal);
    noteModal.addEventListener('click', e => { if (e.target === noteModal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    modalSave.addEventListener('click', async () => {
      const title   = noteTitleInput.value.trim();
      const content = noteBodyInput.value.trim();
      if (!title && !content) return;

      if (currentEditId !== null) {
        await sb.from('notes').update({ title, content }).eq('id', currentEditId);
      } else {
        await sb.from('notes').insert({ title, content });
      }

      const { data } = await sb.from('notes').select('*').order('created_at', { ascending: false });
      renderNotes(data || []);
      closeModal();
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
